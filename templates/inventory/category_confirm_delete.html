{% extends 'base.html' %}
{% block title %}Eliminar categoría - ERP Celulares{% endblock %}
{% block page_title %}Eliminar categoría{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                <h5 class="mt-3">¿Eliminar la categoría <strong>{{ categoria.nombre }}</strong>?</h5>
                <p class="text-muted">Esta acción no se puede deshacer.</p>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <a href="{% url 'inventory:category_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
